# Codeception Test Suite Configuration
#
# Suite for integration tests that require WordPress functions and classes.

actor: WpunitTester
modules:
    enabled:
        - lucatume\WPBrowser\Module\WPLoader
    config:
        lucatume\WPBrowser\Module\WPLoader:
            wpRootFolder: "%WP_ROOT_FOLDER%"
            dbName: "%TEST_DB_NAME%"
            dbHost: "%TEST_DB_HOST%"
            dbUser: "%TEST_DB_USER%"
            dbPassword: "%TEST_DB_PASSWORD%"
            tablePrefix: "%TEST_TABLE_PREFIX%"
            domain: "%TEST_SITE_WP_DOMAIN%"
            adminEmail: "%TEST_SITE_ADMIN_EMAIL%"
            title: "bh-wp-simple-calendar"
            plugins: ["bh-wp-simple-calendar/bh-wp-simple-calendar.php"]
            activatePlugins: ["bh-wp-simple-calendar/bh-wp-simple-calendar.php"]
            WP_CONTENT_DIR: wp-content
